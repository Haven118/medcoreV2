<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trifinity Surgery RP Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }
        #passwordGate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out;
        }
        #passwordGate.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            text-align: center;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 2rem;
            text-align: center;
        }
        #passwordInput {
            width: 300px;
            padding: 1rem;
            font-size: 1.1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            text-align: center;
            margin-bottom: 1rem;
            font-family: 'Inter', monospace;
        }
        #passwordInput::placeholder {
            color: #666;
        }
        #enterButton {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 8px;
            color: #000;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #enterButton:hover {
            transform: scale(1.05);
        }
        #accessDenied {
            color: #ff4444;
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 1rem;
            display: none;
        }
        #mainContainer {
            display: none;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            height: 100vh;
            overflow-y: auto;
        }
        #mainContainer.visible {
            display: block;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #00d4ff;
        }
        input, textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        input::placeholder, textarea::placeholder {
            color: #666;
        }
        textarea {
            height: 120px;
            resize: vertical;
        }
        .toggle-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .toggle-btn {
            padding: 0.8rem 1.5rem;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #00d4ff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .toggle-btn.active {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #000;
        }
        #teamRoles {
            display: none;
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #333;
            border-radius: 8px;
            padding: 1rem;
            background: #1a1a1a;
            margin-bottom: 2rem;
        }
        #teamRoles.visible {
            display: block;
        }
        .role-checkbox {
            display: block;
            margin-bottom: 0.8rem;
            cursor: pointer;
        }
        .role-checkbox input {
            width: auto;
            margin-right: 0.5rem;
        }
        #generateButton {
            width: 100%;
            padding: 1.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            border: none;
            border-radius: 12px;
            color: #000;
            cursor: pointer;
            margin-bottom: 2rem;
            transition: transform 0.2s;
        }
        #generateButton:hover {
            transform: scale(1.02);
        }
        #surgeryOutput {
            max-height: 70vh;
            overflow-y: auto;
            background: #0f0f0f;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 2rem;
            line-height: 1.6;
            font-family: 'Inter', monospace;
        }
        .phase-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 2rem 0 1rem 0;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .or-opening { background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%); }
        .phase-1 { background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%); }
        .phase-2 { background: linear-gradient(135deg, #4488ff 0%, #3366cc 100%); }
        .phase-3 { background: linear-gradient(135deg, #ffaa00 0%, #cc8800 100%); }
        .phase-4 { background: linear-gradient(135deg, #ff4444 0%, #cc3333 100%); }
        .phase-5 { background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%); }
        .phase-6 { background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%); }
        .rp-line {
            margin-bottom: 1rem;
            padding: 1rem;
            border-left: 4px solid #666;
            border-radius: 0 8px 8px 0;
            background: rgba(255,255,255,0.05);
        }
        .rp-say { border-left-color: #00ff88; }
        .rp-do { border-left-color: #4488ff; }
        .rp-radio { border-left-color: #ffaa00; }
        .rp-anesthetist { border-left-color: #aa44ff; }
        .rp-complication { background: rgba(255,68,68,0.2); border-left-color: #ff4444; font-weight: 500; }
        @media (max-width: 768px) {
            .title { font-size: 2rem; }
            #mainContainer { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div id="passwordGate">
        <h1 class="title">Trifinity Surgery RP Generator</h1>
        <p class="subtitle">Authorized Personnel Only</p>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button id="enterButton" onclick="checkPassword()">Enter OR</button>
        <div id="accessDenied">Access Denied - Doctors Only</div>
    </div>

    <div id="mainContainer">
        <div class="input-group">
            <label for="surgeonName">Lead Surgeon Name</label>

        <div class="input-group">
            <label for="assistingDoctors">Assisting Doctors</label>
            <input type="text" id="assistingDoctors" placeholder="Assisting doctors (leave blank if solo)">
        </div>

        <div class="input-group">
            <label for="surgeryPatient">Patient Name</label>
            <input type="text" id="surgeryPatient" placeholder="Patient name">
        </div>

        <div class="input-group">
            <label for="surgeryDesc">Surgery Description</label>
            <textarea id="surgeryDesc" placeholder="Describe what EMS reported and what you see on arrival"></textarea>
        </div>

        <div class="toggle-group">
            <button class="toggle-btn active" id="soloToggle" onclick="toggleMode('solo')">Solo</button>
            <button class="toggle-btn" id="teamToggle" onclick="toggleMode('team')">Team</button>
        </div>

        <div id="teamRoles">
            <div class="role-checkbox">
                <input type="checkbox" id="roleAnest">
                <label for="roleAnest">Anesthetist</label>
            </div>
            <div class="role-checkbox">
                <input type="checkbox" id="roleNurse">
                <label for="roleNurse">Scrub Nurse</label>
            </div>
            <div class="role-checkbox">
                <input type="checkbox" id="roleCirc">
                <label for="roleCirc">Circulating Nurse</label>
            </div>
            <div class="role-checkbox">
                <input type="checkbox" id="roleAssist">
                <label for="roleAssist">Assistant Surgeon</label>
            </div>
            <div class="role-checkbox">
                <input type="checkbox" id="roleEMS">
                <label for="roleEMS">EMS</label>
            </div>
        </div>

        <button id="generateButton" onclick="generateSurgeryScript()">Generate Surgery RP Script</button>

        <div id="surgeryOutput"></div>
    </div>

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === PASSWORD) {
                document.getElementById('passwordGate').classList.add('hidden');
                setTimeout(() => {
                    document.getElementById('passwordGate').style.display = 'none';
                    document.getElementById('mainContainer').classList.add('visible');
                }, 500);
            } else {
                document.getElementById('accessDenied').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('accessDenied').style.display = 'none';
                }, 3000);
            }
        }        function toggleMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(mode + 'Toggle').classList.add('active');
            const teamRoles = document.getElementById('teamRoles');
            if (mode === 'team') {
                teamRoles.classList.add('visible');
            } else {
                teamRoles.classList.remove('visible');
            }

        const phaseNames = {
            'or-opening': '🏥 OR OPENING',
            'phase-1': '📋 PHASE 1 - PATIENT ARRIVAL',

            'phase-3': '⚙️ PHASE 3 - OR PREP & ANAESTHESIA',
            'phase-4': '🔪 PHASE 4 - SURGERY',
            'phase-5': '🧵 PHASE 5 - CLOSING',
            'phase-6': '💊 PHASE 6 - POST-OP & RECOVERY'
        };

        function addHeader(key) {
            const header = document.createElement('div');
            header.className = `phase-header ${key}`;
            header.textContent = phaseNames[key] || key.toUpperCase();
            document.getElementById('surgeryOutput').appendChild(header);
        }

        function addLine(type, text) {
            const div = document.createElement('div');
            div.className = `rp-line rp-${type}`;
            div.innerHTML = text;
            document.getElementById('surgeryOutput').appendChild(div);
        }

        function getSurgeryType(desc) {
            const d = desc.toLowerCase();
            const has = w => new RegExp('\\b' + w + '\\b').test(d);
            if (has('brain') || has('head')) return d.includes('bleed') ? 'brainBleed' : 'gswHead';
            if (has('heart') || has('cardiac') || has('arrest') || d.includes('no pulse')) return d.includes('arrest') ? 'cardiacArrest' : 'tamponade';
            if (has('chest') || has('lung') || has('pneumo') || d.includes('collapsed lung')) return d.includes('pneumo') || d.includes('collapsed') ? 'pneumothorax' : d.includes('stab') || d.includes('knife') ? 'stabChest' : 'gswChest';
            if (has('spleen')) return 'spleen';
            if (has('appendix')) return 'appendix';
            if (has('abdomen') || has('torso') || has('bowel') || has('stomach') || has('belly')) return d.includes('internal bleed') ? 'internalBleed' : d.includes('stab') || d.includes('knife') ? 'stabAbdomen' : 'gswChest';
            if (has('leg') || has('arm') || has('limb') || has('bone') || has('fracture')) return 'gswLimb';
            if (has('burn')) return 'burns';
            if (has('blunt') || has('trauma')) return 'bluntTrauma';
            if (d.includes('internal') && d.includes('bleed')) return 'internalBleed';
            if (has('overdose') || has('od')) return 'overdose';
            if (d.includes('gsw') || d.includes('gunshot') || d.includes('shot') || d.includes('bullet')) return 'gswChest';
            return 'default';
        }

        function generateSurgeryScript() {
            const surgeonName = document.getElementById('surgeonName').value || 'Dr. X';
            const assistingDoctors = document.getElementById('assistingDoctors').value.trim();
            const patient = document.getElementById('surgeryPatient').value || 'the patient';
            const desc = document.getElementById('surgeryDesc').value || 'gunshot wound';
            const surgeryType = getSurgeryType(desc);
            const surgeryName = surgeryType.toUpperCase().replace(/([A-Z])/g, ' $1').trim();
            const steps = surgerySteps[surgeryType] || surgerySteps.default;
            const isCritical = Math.random() < 0.5;
            const vitals = isCritical ? 'critical: BP 70/40 HR 140 - this patient is crashing' : 'stable: BP 110/70 HR 88 - stable for now';
            const anesthetistVitals = isCritical ? 'BP dropping - pushing fluids now, blood supply ready' : 'BP stable - fluids running, keep going Doctor';
            const hasTeam = currentMode === 'team' && (document.getElementById('roleAnest').checked || document.getElementById('roleNurse').checked || document.getElementById('roleCirc').checked || document.getElementById('roleAssist').checked || document.getElementById('roleEMS').checked);
            const randomComplication = complications[Math.floor(Math.random() * complications.length)];

            document.getElementById('surgeryOutput').innerHTML = '';

            // OR OPENING
            addHeader('or-opening');
            addLine('radio', `[RADIO] "Attention all staff - OR is now open. Lead Surgeon: ${surgeonName}. ${assistingDoctors ? 'Assisting: ' + assistingDoctors + '.' : ''} Procedure: ${surgeryName}. Patient: ${patient}. Clear non-essential personnel."`);
            addLine('say', `[SAY] "This is Doctor ${surgeonName}. I am the lead on this case. Everyone in this room answers to me until I say this surgery is done. Is that understood?"`);
            addLine('do', '/me looks around the OR confirming all staff are in position');
            if (assistingDoctors) {
                addLine('say', `[SAY to assistingDoctors] "You are assisting me today. Every cut, every clamp - you wait for my instruction. Understood?"`);
                addLine('say', `[SAY to assistingDoctors] "Your job is to retract when I ask and suction when I ask. Nothing else."`);
            }

            // PHASE 1 - ARRIVAL
            addHeader('phase-1');
            addLine('radio', '[RADIO] "X-Ray to dispatch, patient arriving, stand by for assessment."');
            addLine('say', '"EMS - what happened? Where is the injury? How long have they been down?"');
            addLine('do', '/me performs rapid assessment - checks airway, breathing, pulse and wound sites');
            addLine('say', `"Vitals are [${vitals}]."`);
            addLine('do', '/me calls for a gurney and moves patient inside immediately');

            // PHASE 2 - IMAGING
            addHeader('phase-2');
            addLine('say', '"I am sending this patient to X-Ray and CT before we go to OR - I need to see exactly what we are dealing with."');
            addLine('do', '/me wheels patient to the imaging room');
            addLine('do', '/me reviews the X-Ray and CT scan results carefully');
            addLine('say', `"Based on imaging, this patient needs a ${surgeryName}. Here is what I am seeing: ${desc.substring(0, 60)}..."`);
            addLine('say', '"Prep the OR. We are going in."');

            // PHASE 3 - OR PREP
            addHeader('phase-3');
            addLine('radio', `[RADIO] "X-Ray to all staff - OR is being prepped. Surgery imminent on ${patient}."`);
            addLine('do', '/me scrubs hands thoroughly, gowns up and puts gloves on');
            addLine('do', '/me enters the OR and takes position at the head of the table');
            if (hasTeam && document.getElementById('roleAnest').checked) addLine('say', `"[SAY to Anesthetist] "I need continuous vitals every 60 seconds - BP, HR, O2. Do not stop calling them until I say close.""`);
            if (hasTeam && document.getElementById('roleNurse').checked) addLine('say', `"[SAY to Scrub Nurse] "Instruments on my call only. Sponge count before and after - every single piece accounted for.""`);
            if (hasTeam && document.getElementById('roleCirc').checked) addLine('say', `"[SAY to Circulating Nurse] "Document everything in real time. Blood products on standby - O-neg ready. You move the moment I call.""`);
            if (hasTeam && document.getElementById('roleAssist').checked) addLine('say', `"[SAY to Assistant Surgeon] "You retract and suction on my command. You do not cut, you do not clamp without my instruction.""`);
            if (hasTeam && document.getElementById('roleEMS').checked) addLine('radio', `"[RADIO to EMS] "Patient is in OR. You are clear. Stand by for updates.""`);
            addLine('say', `"${patient}, I need you to count back from 10 for me."`);
            addLine('anesthetist', '"Patient is under. BP stable. ET tube confirmed. Ready when you are, Doctor."');
            addLine('do', '/me drapes the patient and confirms instrument count with the scrub nurse');
            addLine('say', '"Scalpel."');

            // PHASE 4 - SURGERY
            addHeader('phase-4');
            let stepCount = 0;
            steps.forEach((step, index) => {
                stepCount++;
                if (step.startsWith('/me')) {
                    addLine('do', step);
                } else {
                    addLine('say', `"${step}"`);
                }
                if (stepCount % 3 === 0 && assistingDoctors) {
                    const line = `[SAY to assistingDoctors] "${assistLines[assistIndex % assistLines.length]}"`;
                    addLine('say', line);
                    assistIndex++;
                }
                if (index === Math.floor(steps.length / 2)) {
                    addLine('anesthetist', `[ANESTHETIST] "${anesthetistVitals}"`);
                    addLine('complication', `⚠️ [COMPLICATION] ${randomComplication.desc}`);
                    addLine('say', `"${randomComplication.response}"`);
                    randomComplication.steps.forEach(s => {
                        if (s.startsWith('/me')) addLine('do', s);
                        else addLine('say', `"${s}"`);
                    });
                    addLine('complication', `✅ [COMPLICATION RESOLVED] Continuing procedure.`);
                }
            });

            // PHASE 5 - CLOSING
            addHeader('phase-5');
            addLine('say', '"Closing now - stitching the deep layers first, then the middle layer, then stapling the skin."');
            addLine('do', '/me closes the wound in layers carefully');
            addLine('say', '"Checking one final time - no bleeding, no missed instruments, everything looks clean."');
            addLine('do', '/me applies a sterile dressing to the wound');
            addLine('say', '"Patient is stable. Surgery is complete. Moving to recovery."');
            if (assistingDoctors) {
                addLine('say', `[SAY to assistingDoctors] "Watch how I close this - you will need to know this one day."`);
                addLine('say', `[SAY to assistingDoctors] "Good assist today. Write up your notes on this case."`);
            }
            addLine('do', '/me removes draping and prepares patient for transfer');

            // PHASE 6 - POST-OP
            addHeader('phase-6');
            addLine('do', '/me moves patient carefully from the OR table to the recovery bed');
            addLine('say', '"Surgery is done. Patient is stable. Moving to recovery now."');
            addLine('anesthetist', '"Anaesthetic is wearing off - patient will be responsive shortly"');
            addLine('say', '"I am writing the post-op care plan now. No food or water until I clear it."');
            addLine('do', '/me writes post-op prescription - pain medication and antibiotics');
            addLine('say', '"Nurse - monitor vitals every few minutes. Any change, you call me directly."');
            addLine('do', '/me files the full surgical report and hands over to the recovery nurse');
            addLine('radio', `"[RADIO] "X-Ray to dispatch - surgery complete on ${patient}. Patient stable and in recovery.""`);
            addLine('say', '"Family can be told the surgery went well. Patient needs rest - no visitors until I say so."');
            if (assistingDoctors) {
                addLine('say', `[SAY to assistingDoctors] "Check on the patient in 10 minutes and report back to me directly."`);
            }
            addLine('say', '"Total for today\'s procedure is $25,000. Prescription will be at the front desk."');

            document.getElementById('surgeryOutput').scrollTop = 0;
        }
    </script>
</body>
</html>
